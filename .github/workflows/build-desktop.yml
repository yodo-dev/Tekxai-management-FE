name: Build Desktop Agent

on:
  push:
    branches: [main]
    paths:
      - 'desktop-app/**'

  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      - name: Install dependencies
        working-directory: desktop-app
        run: npm ci

      - name: Build macOS DMG
        working-directory: desktop-app
        run: npm run build:mac

      - name: Upload DMG to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: desktop-app/dist/*.dmg
          target: /home/ubuntu/downloads/
          strip_components: 2

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      - name: Install dependencies
        working-directory: desktop-app
        run: npm ci

      - name: Build Windows installer
        working-directory: desktop-app
        run: npm run build:win

      - name: Upload EXE to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: desktop-app/dist/*.exe
          target: /home/ubuntu/downloads/
          strip_components: 2
