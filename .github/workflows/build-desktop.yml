name: Build Desktop Agent

on:
  push:
    branches: [main]
    paths:
      - 'desktop-app/**'
  workflow_dispatch:

jobs:
  # ── macOS build ──────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: desktop-app
        run: npm ci

      - name: Build macOS DMG
        working-directory: desktop-app
        run: npm run build:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: desktop-app/dist/TekXAI-Agent.dmg
          retention-days: 7

  # ── Windows build ─────────────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: desktop-app
        run: npm ci

      - name: Build Windows installer
        working-directory: desktop-app
        run: npm run build:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: desktop-app/dist/TekXAI-Agent-Setup.exe
          retention-days: 7

  # ── Deploy both to EC2 (runs on ubuntu, avoids Windows SCP issues) ────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-mac, build-win]
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: win-exe
          path: dist/

      - name: Create downloads directory on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: mkdir -p /home/ubuntu/downloads

      - name: Upload to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: dist/TekXAI-Agent.dmg,dist/TekXAI-Agent-Setup.exe
          target: /home/ubuntu/downloads/
          strip_components: 1
