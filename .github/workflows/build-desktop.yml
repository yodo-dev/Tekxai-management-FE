name: Build Desktop Agent

on:
  push:
    branches: [main]
    paths:
      - 'desktop-app/**'
  workflow_dispatch:

jobs:
  # ── Job 1: macOS build ───────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: electron-mac-${{ hashFiles('desktop-app/package-lock.json') }}
          restore-keys: electron-mac-

      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron-builder
          key: electron-builder-mac-${{ hashFiles('desktop-app/package-lock.json') }}
          restore-keys: electron-builder-mac-

      - name: Install dependencies
        working-directory: desktop-app
        run: npm ci

      - name: Generate icon.icns from icon.png
        # sips + iconutil are built into macOS — no extra install needed
        run: |
          mkdir -p desktop-app/assets/AppIcon.iconset
          PNG=desktop-app/assets/icon.png
          IS=desktop-app/assets/AppIcon.iconset
          sips -z 16   16   $PNG --out $IS/icon_16x16.png
          sips -z 32   32   $PNG --out $IS/icon_16x16@2x.png
          sips -z 32   32   $PNG --out $IS/icon_32x32.png
          sips -z 64   64   $PNG --out $IS/icon_32x32@2x.png
          sips -z 128  128  $PNG --out $IS/icon_128x128.png
          sips -z 256  256  $PNG --out $IS/icon_128x128@2x.png
          sips -z 256  256  $PNG --out $IS/icon_256x256.png
          sips -z 512  512  $PNG --out $IS/icon_256x256@2x.png
          sips -z 512  512  $PNG --out $IS/icon_512x512.png
          sips -z 1024 1024 $PNG --out $IS/icon_512x512@2x.png
          iconutil -c icns $IS -o desktop-app/assets/icon.icns
          echo "Generated icon.icns ($(wc -c < desktop-app/assets/icon.icns) bytes)"

      - name: Build macOS DMG
        working-directory: desktop-app
        run: npm run build:mac

      - name: Verify macOS artifact
        run: |
          test -f desktop-app/dist/TekXAI-Agent.dmg \
            || (echo "❌ TekXAI-Agent.dmg not found" && exit 1)
          echo "✅ TekXAI-Agent.dmg ($(du -sh desktop-app/dist/TekXAI-Agent.dmg | cut -f1))"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: desktop-app/dist/TekXAI-Agent.dmg
          retention-days: 30

  # ── Job 2: Windows build ──────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron\Cache
          key: electron-win-${{ hashFiles('desktop-app/package-lock.json') }}
          restore-keys: electron-win-

      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron-builder\Cache
          key: electron-builder-win-${{ hashFiles('desktop-app/package-lock.json') }}
          restore-keys: electron-builder-win-

      - name: Install dependencies
        working-directory: desktop-app
        run: npm ci

      - name: Generate icon.ico from icon.png
        # ImageMagick is pre-installed on windows-latest; fallback to .png copy
        shell: bash
        run: |
          magick desktop-app/assets/icon.png \
            -define icon:auto-resize=256,128,64,48,32,16 \
            desktop-app/assets/icon.ico 2>/dev/null \
          || cp desktop-app/assets/icon.png desktop-app/assets/icon.ico
          echo "icon.ico: $(wc -c < desktop-app/assets/icon.ico) bytes"

      - name: Build Windows installer
        working-directory: desktop-app
        run: npm run build:win

      - name: Verify Windows artifact
        shell: bash
        run: |
          test -f desktop-app/dist/TekXAI-Agent-Setup.exe \
            || (echo "❌ TekXAI-Agent-Setup.exe not found" && exit 1)
          echo "✅ TekXAI-Agent-Setup.exe found"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: desktop-app/dist/TekXAI-Agent-Setup.exe
          retention-days: 30

  # ── Job 3: Deploy from Ubuntu (avoids Windows SCP path issues) ───────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-mac, build-win]
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: win-exe
          path: dist/

      - name: Debug — show downloaded files
        run: find dist/ -type f | sort

      - name: Verify both artifacts exist
        run: |
          FAIL=0
          test -f dist/TekXAI-Agent.dmg \
            && echo "✅ TekXAI-Agent.dmg ($(du -sh dist/TekXAI-Agent.dmg | cut -f1))" \
            || { echo "❌ TekXAI-Agent.dmg MISSING"; FAIL=1; }
          test -f dist/TekXAI-Agent-Setup.exe \
            && echo "✅ TekXAI-Agent-Setup.exe ($(du -sh dist/TekXAI-Agent-Setup.exe | cut -f1))" \
            || { echo "❌ TekXAI-Agent-Setup.exe MISSING"; FAIL=1; }
          [ $FAIL -eq 0 ] || exit 1

      - name: Generate SHA256 checksums
        run: |
          sha256sum dist/TekXAI-Agent.dmg      > dist/TekXAI-Agent.dmg.sha256
          sha256sum dist/TekXAI-Agent-Setup.exe > dist/TekXAI-Agent-Setup.exe.sha256
          HASH_MAC=$(awk '{print $1}' dist/TekXAI-Agent.dmg.sha256)
          HASH_WIN=$(awk '{print $1}' dist/TekXAI-Agent-Setup.exe.sha256)
          echo "HASH_MAC=$HASH_MAC" >> $GITHUB_ENV
          echo "HASH_WIN=$HASH_WIN" >> $GITHUB_ENV
          echo "Mac  SHA256: $HASH_MAC"
          echo "Win  SHA256: $HASH_WIN"

      - name: Generate build metadata
        run: |
          VERSION=$(node -p "require('./desktop-app/package.json').version")
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          AUTHOR="${{ github.actor }}"
          COMMIT_MSG=$(git log -1 --pretty=%s)
          SHORT="${COMMIT:0:7}"

          jq -n \
            --arg version    "$VERSION" \
            --arg buildDate  "$BUILD_DATE" \
            --arg commit     "$COMMIT" \
            --arg branch     "$BRANCH" \
            --arg author     "$AUTHOR" \
            --arg msg        "$COMMIT_MSG" \
            --arg hashMac    "$HASH_MAC" \
            --arg hashWin    "$HASH_WIN" \
            '{
              version:               $version,
              buildDate:             $buildDate,
              commit:                $commit,
              branch:                $branch,
              author:                $author,
              commitMessage:         $msg,
              releaseNotes:          ("Version \($version)\nCommit: \($commit[:7])\nBranch: \($branch)\nAuthor: \($author)\nDate: \($buildDate)\n\n\($msg)"),
              platforms:             ["windows","mac"],
              minimumBackendVersion: "1.0.0",
              checksums:             { mac: $hashMac, windows: $hashWin }
            }' > dist/metadata.json

          echo "--- metadata.json ---"
          cat dist/metadata.json

      - name: Upload all files to server latest/
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/TekXAI-Agent.dmg,dist/TekXAI-Agent-Setup.exe,dist/TekXAI-Agent.dmg.sha256,dist/TekXAI-Agent-Setup.exe.sha256,dist/metadata.json"
          target: /home/ubuntu/downloads/latest/
          strip_components: 1

      - name: Verify uploaded files on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            FAIL=0
            for f in TekXAI-Agent.dmg TekXAI-Agent-Setup.exe metadata.json \
                      TekXAI-Agent.dmg.sha256 TekXAI-Agent-Setup.exe.sha256; do
              if [ -f "/home/ubuntu/downloads/latest/$f" ]; then
                echo "✅ $f"
              else
                echo "❌ $f MISSING"
                FAIL=1
              fi
            done
            [ $FAIL -eq 0 ] || exit 1

      - name: Archive release and prune old builds (keep last 5)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            RELEASE_NAME="build-$(date +%s)"
            RELEASE_DIR="/home/ubuntu/downloads/releases/$RELEASE_NAME"
            mkdir -p "$RELEASE_DIR"
            cp /home/ubuntu/downloads/latest/* "$RELEASE_DIR/"

            cd /home/ubuntu/downloads/releases
            ls -1t | tail -n +6 | xargs -I {} rm -rf {} 2>/dev/null || true

            echo "✅ Archived as $RELEASE_NAME"
            echo "✅ Releases on disk: $(ls | wc -l)"
            echo "✅ Desktop Agent v$(python3 -c "import json; print(json.load(open('/home/ubuntu/downloads/latest/metadata.json'))['version'])")" deployed
