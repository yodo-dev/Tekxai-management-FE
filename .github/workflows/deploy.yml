name: Tekxai Management FE - Frontend Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build
      env:
        NODE_OPTIONS: --max-old-space-size=4096

    - name: Verify build output
      run: |
        test -d dist && echo "✅ dist/ exists" || (echo "❌ dist/ missing" && exit 1)
        echo "Build size: $(du -sh dist/)"

    - name: Deploy dist to server via SCP
      env:
        SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        HOST: ${{ secrets.SERVER_HOST }}
        USER: ${{ secrets.SERVER_USER }}
      run: |
        echo "$SSH_KEY" > /tmp/deploy_key
        chmod 600 /tmp/deploy_key
        SSH_OPTS="-i /tmp/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes"

        # Pack into single tar for fast transfer
        tar -czf /tmp/fe-dist.tar.gz -C dist .

        # Upload single tar file
        scp $SSH_OPTS /tmp/fe-dist.tar.gz $USER@$HOST:/tmp/fe-dist.tar.gz

        # Extract and deploy on server
        ssh $SSH_OPTS $USER@$HOST "
          set -e
          RELEASE_NAME=\"build-\$(date +%s)\"
          RELEASE_DIR=\"/var/www/tekxai-manage-FE/releases/\$RELEASE_NAME\"
          sudo mkdir -p \"\$RELEASE_DIR\"
          sudo tar -xzf /tmp/fe-dist.tar.gz -C \"\$RELEASE_DIR\"
          sudo cp -rf \"\$RELEASE_DIR\"/. /var/www/html/
          sudo chown -R www-data:www-data /var/www/html
          sudo find /var/www/html -type d -exec chmod 755 {} \;
          sudo find /var/www/html -type f -exec chmod 644 {} \;
          rm -f /tmp/fe-dist.tar.gz
          cd /var/www/tekxai-manage-FE/releases && ls -1t | tail -n +6 | xargs -I {} sudo rm -rf {} 2>/dev/null || true
          echo \"✅ Deployed \$RELEASE_NAME at \$(date)\"
        "

        rm /tmp/deploy_key
