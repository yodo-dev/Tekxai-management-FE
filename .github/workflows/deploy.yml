name: Tekxai Management FE - Frontend Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build
      env:
        NODE_OPTIONS: --max-old-space-size=4096

    - name: Verify build output
      run: |
        test -d dist && echo "✅ dist/ exists" || (echo "❌ dist/ missing" && exit 1)
        echo "Build size: $(du -sh dist/)"

    - name: Deploy dist to server via SCP
      env:
        SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        HOST: ${{ secrets.SERVER_HOST }}
        USER: ${{ secrets.SERVER_USER }}
      run: |
        echo "$SSH_KEY" > /tmp/deploy_key
        chmod 600 /tmp/deploy_key
        SSH_OPTS="-i /tmp/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes"

        RELEASE_NAME="build-$(date +%s)"
        RELEASE_DIR="/var/www/tekxai-manage-FE/releases/$RELEASE_NAME"

        # Ensure release directory exists on server
        ssh $SSH_OPTS $USER@$HOST "mkdir -p $RELEASE_DIR"

        # Upload built dist/ to release dir
        scp $SSH_OPTS -r dist/. $USER@$HOST:$RELEASE_DIR/

        # Swap into /var/www/html and fix permissions
        ssh $SSH_OPTS $USER@$HOST "
          sudo cp -rf $RELEASE_DIR/. /var/www/html/
          sudo chown -R www-data:www-data /var/www/html
          sudo find /var/www/html -type d -exec chmod 755 {} \;
          sudo find /var/www/html -type f -exec chmod 644 {} \;

          # Prune old releases (keep last 5)
          cd /var/www/tekxai-manage-FE/releases && ls -1t | tail -n +6 | xargs -I {} sudo rm -rf {} 2>/dev/null || true

          echo '✅ Deployment completed at \$(date)'
        "

        rm /tmp/deploy_key
