name: Tekxai Management FE - Frontend Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Deploy to AWS via SSH
      uses: appleboy/ssh-action@v1.0.3

      env:
        GITHUB_USER: ${{ secrets.GH_USER }}
        GITHUB_PAT: ${{ secrets.GH_PAT }}
      
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }} 
        envs: GITHUB_USER,GITHUB_PAT
        script: |
          set -e
          
          # Navigate to the project directory
          cd /home/ubuntu/tekxai-management-FE

          echo "Configuring temporary credentials for git fetch..."
          git remote set-url origin "https://${GITHUB_PAT}@github.com/yodo-dev/Tekxai-management-FE.git"

          echo "Pulling latest code from git..."
          git fetch origin
          git reset --hard origin/main

          echo "Cleaning up credentials from git config..."
          git remote set-url origin "https://github.com/yodo-dev/Tekxai-management-FE.git"

          echo "Installing dependencies..."
          npm install

          echo "Building..."
          npm run build

          echo "✅ Build created successfully!"

          # 1. Define unique release name based on epoch timestamp
          RELEASE_NAME="build-$(date +%s)"
          RELEASE_DIR="/var/www/tekxai-management-FE/releases/$RELEASE_NAME"

          echo "Creating new release directory: $RELEASE_DIR"
          sudo mkdir -p "$RELEASE_DIR"

          echo "Copying distribution files to release directory..."
          sudo cp -r /home/ubuntu/tekxai-management-FE/dist/* "$RELEASE_DIR/"

          echo "Fixing permissions..."
          sudo chown -R www-data:www-data "$RELEASE_DIR"
          sudo find "$RELEASE_DIR" -type d -exec chmod 755 {} \;
          sudo find "$RELEASE_DIR" -type f -exec chmod 644 {} \;

          echo "🔄 Swapping symlink atomically to zero-downtime path..."
          # -s (symlink), -f (force/overwrite existing link), -n (treat link as a normal file if it's a directory link)
          sudo ln -sfn "$RELEASE_DIR" /var/www/html

          echo "Cleaning up older releases (keeping the last 5 builds)..."
          cd /var/www/tekxai-management-FE/releases && ls -1t | tail -n +6 | xargs -I {} sudo rm -rf {}

          echo "✅ Zero-Downtime Deployment completed successfully $(date)"
